<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Product — MEDXONE SYNERGY</title>
        <link rel="icon" type="image/png" href="/favicon.png" />
        <link rel="apple-touch-icon" href="/favicon.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/css/style.css" />
        <script src="https://unpkg.com/lucide@latest" defer></script>
    </head>
    <body data-testid="product-detail-page">
        <div id="root"></div>

        <header class="site-header">
            <div class="container">
                <a class="brand" href="/" data-testid="brand-logo">
                    <img src="/logo.png" alt="MEDXONE SYNERGY" class="brand-img" />
                </a>
                <nav class="nav-links">
                    <a href="/">Home</a>
                    <a href="/catalog.html">Catalog</a>
                    <a href="/#about">About</a>
                    <a href="/#contact">Contact</a>
                </nav>
                <button class="mobile-toggle" data-testid="mobile-menu-toggle" aria-label="Toggle menu">
                    <i data-lucide="menu" width="24" height="24"></i>
                </button>
            </div>
        </header>

        <section class="light-section" style="padding-top: 1rem; padding-bottom: 4rem; position: relative; overflow: hidden; min-height: 80vh;">
            <div class="hero-glass-lights">
                <div class="light-orb orb-1"></div>
                <div class="light-orb orb-2"></div>
                <div class="light-orb orb-3"></div>
                <div class="light-orb orb-4"></div>
            </div>
            <div class="hero-glass-overlay-light"></div>

            <div class="container" style="position: relative; z-index: 1;">
                <div class="breadcrumb">
                    <a href="/">Home</a> ›
                    <a href="/catalog.html">Catalog</a> ›
                    <span id="crumbName" data-testid="breadcrumb-product">…</span>
                </div>
                <div id="productContainer">
                    <div class="empty-state" data-testid="product-loading">Loading product…</div>
                </div>
            </div>
        </section>

        <footer class="site-footer">
            <div class="container">
                <div>
                    <a href="/" class="brand brand-on-dark" style="margin-bottom: 1rem;">
                        <img src="/logo.png" alt="MEDXONE SYNERGY" class="brand-img" />
                    </a>
                    <p style="color:#6f8aa6; font-size: 0.85rem; margin-top: 1rem; letter-spacing: 0.08em;">
                        CARE · CONNECT · COMMIT · CURE
                    </p>
                </div>
                <div>
                    <h4>Explore</h4>
                    <a href="/">Home</a>
                    <a href="/catalog.html">Catalog</a>
                </div>
                <div>
                    <h4>Get in touch</h4>
                    <a href="mailto:sales@medxone.com">sales@medxone.com</a>
                    <a href="tel:+919876543210">+91 98765 43210</a>
                </div>
            </div>
            <div class="footer-bottom">
                © <span id="footerYear"></span> MEDXONE SYNERGY · All rights reserved.
            </div>
        </footer>

        <!-- Scroll to top -->
        <button class="scroll-top" aria-label="Back to top" data-testid="scroll-top">
            <i data-lucide="chevron-up" width="20" height="20"></i>
        </button>

        <script src="/js/common.js"></script>
        <script src="/js/product.js"></script>
        <script src="/js/enhance.js"></script>
    </body>
</html>
